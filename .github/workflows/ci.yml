name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t vinyl-cache:test .

      - name: Engine present
        run: docker run --rm vinyl-cache:test varnishd -V 2>&1 | grep -qi varnish

      - name: VCL compiles
        run: |
          docker run --rm -v "$PWD/test":/vcltest:ro vinyl-cache:test \
            varnishd -C -f /vcltest/test.vcl >/dev/null
